# kentik_report.ini — Configuration for parse_kentik_attacks_v2.py
#
# Time-range options (only ONE of the three blocks below is used;
# priority order: fixed_range > last_hours > last_days):
#
#   [range]
#   start = YYYY-MM-DD HH:MM:SS   ← fixed window start (inclusive)
#   end   = YYYY-MM-DD HH:MM:SS   ← fixed window end   (inclusive)
#
#   [range]
#   last_hours = 24                ← rolling window: last N hours from now
#
#   [range]
#   last_days = 7                  ← rolling window: last N days from now
#
# Leave all three commented out (or set to empty) to include ALL attacks.

[range]
start      = 2026-03-01 00:00:00
end        = 2026-03-30 23:59:59
#last_hours = 24
#last_days  = 7

[paths]
# Defaults used by parse_kentik_attacks_v2.py when these are left empty.
log_dir  = Input
out_file = Reports/kentik_attack_cycles_{date}.csv

[defensepro]
# Defaults used by parse_defensepro_attacks_v2.py when these are left empty.
log_dir  = Input
out_file = Reports/defensepro_attack_sessions_{date}.csv
